; PlatformIO Project Configuration File for ESP32RC
; High-current load controller with RC input

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Libraries for current/voltage monitoring
lib_deps = 
    adafruit/Adafruit INA219@^1.2.1
    adafruit/Adafruit BusIO@^1.14.1

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3

; Upload settings
upload_speed = 921600

; Self-test environment for bring-up without a live RC signal
[env:esp32dev_selftest]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    adafruit/Adafruit INA219@^1.2.1
    adafruit/Adafruit BusIO@^1.14.1
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DENABLE_SERIAL_SELF_TEST=1
upload_speed = 921600
